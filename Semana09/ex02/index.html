<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 02 - Conversor de Temperatura</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; }
        input { margin: 10px 0; display: block; }
    </style>
</head>
<body>

    <h2>Conversor de Temperatura</h2>

    <label>Celsius:</label>
    <input type="number" id="celsius" step="0.1" oninput="converterCelsius()">

    <label>Fahrenheit:</label>
    <input type="number" id="fahrenheit" step="0.1" oninput="converterFahrenheit()">

    <script>
        function converterCelsius() {
            var c = document.getElementById("celsius").value;
            var f = (c * 9/5) + 32;
            document.getElementById("fahrenheit").value = f.toFixed(2);
        }

        function converterFahrenheit() {
            var f = document.getElementById("fahrenheit").value;
            var c = (f - 32) * 5/9;
            document.getElementById("celsius").value = c.toFixed(2);
        }
    </script>

</body>
</html>
