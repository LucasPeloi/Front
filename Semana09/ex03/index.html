<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 03 - Média Escolar</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; }
        input { margin: 5px 0; display: block; }
        #resultado { margin-top: 15px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <h2>Média Escolar</h2>

    <label>Nome do aluno:</label>
    <input type="text" id="nome">

    <label>Nota 1:</label>
    <input type="number" id="nota1" step="0.1">

    <label>Nota 2:</label>
    <input type="number" id="nota2" step="0.1">

    <label>Nota 3:</label>
    <input type="number" id="nota3" step="0.1">

    <button onclick="calcular()">Calcular</button>

    <p id="resultado"></p>

    <script>
        document.querySelector("button").addEventListener("click", calcular);

        function calcular() {
            var nome = document.getElementById("nome").value;
            var n1 = Number(document.getElementById("nota1").value);
            var n2 = Number(document.getElementById("nota2").value);
            var n3 = Number(document.getElementById("nota3").value);

            var media = (n1 + n2 + n3) / 3;
            var resultado = document.getElementById("resultado");

            if (media >= 7.0) {
                resultado.style.color = "blue";
                resultado.textContent = nome + " - Média: " + media.toFixed(2) + " - Aprovado!";
            } else if (media >= 4.0) {
                var falta = 10 - media;
                resultado.style.color = "green";
                resultado.textContent = nome + " - Média: " + media.toFixed(2) + " - Exame! Faltam " + falta.toFixed(2) + " pontos para 10.";
            } else {
                resultado.style.color = "red";
                resultado.textContent = nome + " - Média: " + media.toFixed(2) + " - Reprovado!";
            }
        }
    </script>

</body>
</html>
