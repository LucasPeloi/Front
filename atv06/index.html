<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bichinho Virtual</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87ceeb, #b0e0ff, #e0f4ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #quadro {
            background-color: white;
            border: 3px solid #aad4f5;
            border-radius: 20px;
            width: 300px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
        }

        #bicho {
            width: 180px;
        }

        #btn {
            width: 100px;
            cursor: pointer;
        }

        #btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div id="quadro">
        <img id="bicho" src="criatura_fofa.png">
        <img id="btn" src="melancia.png" onclick="alimentar()">
    </div>

    <script src="script.js"></script>
</body>
</html>
